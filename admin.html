<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير | بن صعبان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <h2 class="gold-text" style="margin-bottom: 20px; text-align: center;">تسجيل الدخول للمسؤول</h2>
            <form id="login-form-submit">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="login-user" required autocomplete="off" placeholder="admin" dir="ltr">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="login-pass" required placeholder="••••••••" dir="ltr">
                </div>
                <p id="login-error" style="color: var(--danger); font-size: 0.9rem; display: none; margin-bottom: 10px;">بيانات الدخول غير صحيحة!</p>
                <button type="submit" class="btn btn-primary w-100">دخول</button>
            </form>
            <a href="index.html" style="display: block; text-align: center; color: #888; font-size: 0.9rem; text-decoration: none; margin-top: 15px;">العودة للمتجر</a>
        </div>
    </div>

    <div class="admin-container" id="admin-dashboard" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">لوحة التحكم</div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#">إدارة المنتجات</a></li>
                <li><a href="index.html">العودة للمتجر</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header" style="display: flex; justify-content: space-between; align-items: center;">
                <button id="sidebar-toggle" class="btn btn-small" style="display: none; background: var(--sidebar-bg); border: 1px solid var(--border); color: var(--gold); padding: 8px 12px;">☰</button>
                <h2>إدارة المنتجات</h2>
                <div style="width: 40px;"></div> <!-- Spacer -->
            </header>

            <div class="content">
                <!-- Add Product Form -->
                <div class="card form-card" id="form-section">
                    <h3 id="form-title">إضافة منتج جديد</h3>
                    <form id="add-product-form">
                        <div class="form-group">
                            <label>اسم المنتج</label>
                            <input type="text" id="product-name" required placeholder="مثال: عطر العود الأصيل">
                        </div>
                        <div class="form-group-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>السعر (ريال)</label>
                                <input type="number" id="product-price" required placeholder="مثال: 350">
                            </div>
                            <div class="form-group">
                                <label>رمز المنتج (تلقائي)</label>
                                <input type="text" id="product-code" readonly placeholder="سيتم توليده تلقائياً" style="background: rgba(255,255,255,0.02); color: #888; cursor: not-allowed;">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>الكمية المتوفرة في المخزن</label>
                            <input type="number" id="product-stock" required placeholder="مثال: 50">
                        </div>
                        <div class="form-group">
                            <label>صور المنتج (يمكنك اختيار عدة صور)</label>
                            <div class="image-upload-options">
                                <input type="file" id="product-image-file" accept="image/*" class="file-input" multiple>
                                <div class="separator">- أو ادخل روابط الصور (رابط في كل سطر) -</div>
                                <textarea id="product-image-urls" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg" style="width: 100%; height: 60px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 8px; resize: vertical;"></textarea>
                            </div>
                            <div id="image-previews" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;"></div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" id="submit-btn" class="btn btn-primary mt-2" style="flex: 1;">حفظ المنتج</button>
                            <button type="button" id="cancel-edit-btn" class="btn mt-2" style="display: none; background: #333; color: #fff; flex: 1;">إلغاء التعديل</button>
                        </div>
                    </form>
                </div>

                <!-- Products Table -->
                <div class="card table-card">
                    <h3>المنتجات المتوفرة <button id="reset-default" class="btn btn-small btn-danger" style="float: left;">استعادة المنتجات الافتراضية</button></h3>
                    <div class="table-responsive">
                        <table id="products-table">
                            <thead>
                                <tr>
                                    <th>الصورة</th>
                                    <th>اسم المنتج</th>
                                    <th>الرمز</th>
                                    <th>السعر</th>
                                    <th>المخزون</th>
                                    <th>إجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="products-tbody">
                                <!-- JS will populate this -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
